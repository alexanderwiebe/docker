global:
  resolve_timeout: 5m

route:
  group_by: [alertname, job]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'null'
  # routes:
  #   - match:
  #       severity: critical
  #     receiver: pagerduty

receivers:
  - name: 'null'
  # - name: pagerduty
  #   pagerduty_configs:
  #     - service_key: <key>
  # - name: slack
  #   slack_configs:
  #     - api_url: <webhook-url>
  #       channel: '#alerts'

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, job, instance]
